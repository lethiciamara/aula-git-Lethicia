<!DOCTYPE html>
<html>
<head>
<title>Aula de Formulário</title>
<link rel="stylesheet" href="style/index.css">
</head>
<body>
<form>
<label for="nome">Nome</label>
<input type="text" id="nome" name="nome" required placeholder="Ex:Luciano Mendes"/>
 
<label for="email">Email</label>
<input for ="text" id="Email" email="email" required placeholder="email@exemplo.com">
 
<label for="">Telefone</label>
<input type="tel" name="telefone" id="telefone" required placeholder="ex.: 00 11111-1111">
<label for="nascimento"  >data de nascimento </label>
<input type="date" name="nascimento" id="nascimento" required/>
<label for="senha"></label>
<input type="password">

 
<button type="submit" style="width: 90%; padding: 10px; cursor: pointer;">Enviar</button>
</form>
</body>
</html>
